<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 240px; padding: 16px; margin: 0; }
    h2 { margin: 0 0 10px; font-size: 14px; color: #333; letter-spacing: .5px; }
    #status { font-size: 12px; color: #666; margin-bottom: 14px; min-height: 16px; line-height: 1.4; }
    #status.success { color: #2e7d32; }
    #status.error { color: #c62828; }
    button {
      width: 100%; padding: 8px 0; background: #e84057; color: #fff;
      border: none; border-radius: 5px; font-size: 13px; cursor: pointer;
    }
    button:disabled { background: #bdbdbd; cursor: default; }
  </style>
</head>
<body>
  <h2>VATRACK SYNC</h2>
  <div id="status">初始化中...</div>
  <button id="sync-btn" disabled>同步对局</button>
  <script src="popup.js"></script>
</body>
</html>
